name: Commons Validator Distributed AOT Cache

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      single_aot_jdk:
        description: 'JDK version used for single.aot'
        required: false
        default: '24'
        type: choice
        options:
          - '25'
          - '24'

jobs:
  tree-combine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download custom JDK
        uses: ./.github/actions/download-custom-jdk

      - name: Set up custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build commons-beanutils cache (tree-merge)
        working-directory: commons-validator-experiment/commons-validator-deps/commons-beanutils
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn clean test -Ptree-merge -q
          test -f cache.aot

      - name: Build commons-digester cache (tree-merge)
        working-directory: commons-validator-experiment/commons-validator-deps/commons-digester
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn clean test -Ptree-merge -q
          test -f cache.aot

      - name: Build commons-logging cache (tree-merge)
        working-directory: commons-validator-experiment/commons-validator-deps/commons-logging
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn clean verify -Ptree-merge -q
          test -f cache.aot

      - name: Build commons-collections cache (tree-merge)
        working-directory: commons-validator-experiment/commons-validator-deps/commons-collections
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn clean test -Ptree-merge -q
          test -f cache.aot

      - name: Build commons-validator cache (tree-merge)
        working-directory: commons-validator-experiment/commons-validator
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn clean test -Ptree-merge -q
          test -f cache.aot

      - name: Build benchmark fat jar
        working-directory: commons-validator-experiment/benchmark
        run: mvn package -DskipTests -q

      - name: Set up JDK ${{ inputs.single_aot_jdk }} (no-AOT baseline and single.aot)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.single_aot_jdk || '24' }}

      - name: Capture Temurin JDK path
        run: echo "TEMURIN_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Create single.aot (JDK ${{ inputs.single_aot_jdk || '24' }})
        working-directory: commons-validator-experiment
        run: |
          set -euo pipefail
          chmod +x create-single-aot.sh
          ./create-single-aot.sh
          for op in validate-email validate-url validate-ip validate-credit-card; do
            test -f "single-${op}.aot"
          done

      - name: Re-enable custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Create tree.aot (orchestrate-combine.sh)
        working-directory: commons-validator-experiment
        run: |
          set -euo pipefail
          chmod +x orchestrate-combine.sh
          combine_out=$(./orchestrate-combine.sh 2>&1) || { echo "$combine_out"; exit 1; }
          echo "$combine_out"
          combine_out_clean=$(echo "$combine_out" | sed 's/\x1B\[[0-9;]*m//g')

          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## tree.aot creation (orchestrate-combine)"
            echo
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$combine_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          test -f tree.aot

      - name: Run timed workload
        working-directory: commons-validator-experiment
        run: |
          set -euo pipefail
          chmod +x workload-timed.sh
          wl_out=$(JAVA_NO_BIN="$TEMURIN_JAVA_HOME/bin/java" JAVA_MONOLITHIC_BIN="$TEMURIN_JAVA_HOME/bin/java" JAVA_MERGED_BIN="$JAVA_HOME/bin/java" ./workload-timed.sh 2>&1) || { echo "$wl_out"; exit 1; }
          echo "$wl_out"
          wl_out_clean=$(echo "$wl_out" | sed 's/\x1B\[[0-9;]*m//g')

          single_size=$(du -ch single-*.aot | tail -1 | awk '{print $1}')
          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## Timed workload results (no-AOT vs monolithic vs merged)"
            echo
            echo "- single-*.aot total: ${single_size}"
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$wl_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Append LaTeX table rows to summary
        working-directory: commons-validator-experiment
        run: |
          {
            echo "## LaTeX table rows (single=monolithic, tree=merged)"
            echo
            echo '```latex'
            cat workload-tmp/latex-rows.tex
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write artifact summary
        working-directory: commons-validator-experiment
        run: |
          set -euo pipefail

          {
            echo "## Distributed AOT artifact summary"
            echo
            echo "| Artifact | Cache path | Size |"
            echo "|---|---|---|"
            echo "| commons-beanutils | \`commons-validator-deps/commons-beanutils/cache.aot\` | $(du -h commons-validator-deps/commons-beanutils/cache.aot | awk '{print $1}') |"
            echo "| commons-digester | \`commons-validator-deps/commons-digester/cache.aot\` | $(du -h commons-validator-deps/commons-digester/cache.aot | awk '{print $1}') |"
            echo "| commons-logging | \`commons-validator-deps/commons-logging/cache.aot\` | $(du -h commons-validator-deps/commons-logging/cache.aot | awk '{print $1}') |"
            echo "| commons-collections | \`commons-validator-deps/commons-collections/cache.aot\` | $(du -h commons-validator-deps/commons-collections/cache.aot | awk '{print $1}') |"
            echo "| commons-validator | \`commons-validator/cache.aot\` | $(du -h commons-validator/cache.aot | awk '{print $1}') |"
            for op in validate-email validate-url validate-ip validate-credit-card; do
              echo "| single-${op} | \`single-${op}.aot\` | $(du -h "single-${op}.aot" | awk '{print $1}') |"
            done
            echo "| tree | \`tree.aot\` | $(du -h tree.aot | awk '{print $1}') |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Commons Validator workload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: commons-validator-tree-artifacts
          path: |
            commons-validator-experiment/workload-tmp/
            commons-validator-experiment/aotlink-tree-create.log
            commons-validator-experiment/single-*.aot
            commons-validator-experiment/tree.aot
            commons-validator-experiment/commons-validator/cache.aot
            commons-validator-experiment/commons-validator-deps/commons-beanutils/cache.aot
            commons-validator-experiment/commons-validator-deps/commons-digester/cache.aot
            commons-validator-experiment/commons-validator-deps/commons-logging/cache.aot
            commons-validator-experiment/commons-validator-deps/commons-collections/cache.aot
          if-no-files-found: error
