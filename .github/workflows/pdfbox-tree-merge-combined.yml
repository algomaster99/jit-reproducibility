name: PDFBox Distributed AOT Cache

on:
  workflow_dispatch:
    inputs:
      baseline_jdk:
        description: 'JDK version used for no-AOT baseline'
        required: false
        default: '24'
        type: choice
        options:
          - '25'
          - '24'

jobs:
  tree-combine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download custom JDK
        uses: ./.github/actions/download-custom-jdk

      - name: Set up custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build PDFBox tools cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn package -q -Ptree-merge
          test -f tools/cache.aot
          test -f io/cache.aot
          test -f fontbox/cache.aot
          test -f pdfbox/cache.aot

      - name: Build JBIG2 cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox-deps/pdfbox-jbig2
        run: |
          set -euo pipefail
          mvn clean test -Ptree-merge -q
          test -f cache.aot

      - name: Build Apache Commons IO cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox-deps/apache-commons-io
        run: |
          set -euo pipefail
          mvn clean test -q
          test -f cache.aot

      - name: Build workload jars for missing dependency caches
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail

          workloads=(
            pdfbox-deps/commons-logging-workload
          )

          for workload in "${workloads[@]}"; do
            echo "Building $workload"
            (cd "$workload" && mvn -q clean package)
          done

      - name: Record workload-based AOT caches
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          rm -f \
            pdfbox-deps/commons-logging-workload/cache.aot

          java -XX:AOTCacheOutput=pdfbox-deps/commons-logging-workload/cache.aot \
            -jar pdfbox-deps/commons-logging-workload/target/commons-logging-workload-1.0-SNAPSHOT.jar

          test -f pdfbox-deps/commons-logging-workload/cache.aot

      - name: Set up Temurin JDK ${{ inputs.baseline_jdk || '24' }} (no-AOT baseline)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.baseline_jdk || '24' }}

      - name: Capture Temurin java path
        run: echo "TEMURIN_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Re-enable custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Create per-op monolithic AOT caches
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x create-single-aot.sh
          ./create-single-aot.sh
          for op in export-text export-images render fromtext split merge decode overlay; do
            test -f "single-${op}.aot"
          done

      - name: Create tree.aot (orchestrate-combine-4.sh)
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x orchestrate-combine-4.sh
          tree_out=$(./orchestrate-combine-4.sh 2>&1)
          echo "$tree_out"
          tree_out_clean=$(echo "$tree_out" | sed 's/\x1B\[[0-9;]*m//g')

          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## tree.aot creation (orchestrate-combine-4)"
            echo
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$tree_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          test -f tree.aot

      - name: Verify merged AOT cache coverage
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x check-aot-full.sh
          check_out=$(./check-aot-full.sh 2>&1)
          echo "$check_out"
          check_out_clean=$(echo "$check_out" | sed 's/\x1B\[[0-9;]*m//g')

          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## AOT verification (check-aot-full.sh)"
            echo
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$check_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run timed workload
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x workload-timed.sh
          wl_out=$(JAVA_NO_BIN="$TEMURIN_JAVA_HOME/bin/java" ./workload-timed.sh 2>&1)
          echo "$wl_out"
          wl_out_clean=$(echo "$wl_out" | sed 's/\x1B\[[0-9;]*m//g')

          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## Timed workload results (no-AOT vs monolithic vs tree)"
            echo
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$wl_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Emit LaTeX table rows
        working-directory: pdfbox-experiment
        run: |
          {
            echo "## LaTeX table rows (single=monolithic, tree=merged)"
            echo
            echo '```latex'
            cat workload-tmp/latex-rows.tex
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write artifact summary
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail

          {
            echo "## Distributed AOT artifact summary"
            echo
            echo "| Artifact | Cache path | Size |"
            echo "|---|---|---|"
            echo "| io | \`pdfbox/io/cache.aot\` | $(du -h pdfbox/io/cache.aot | awk '{print $1}') |"
            echo "| fontbox | \`pdfbox/fontbox/cache.aot\` | $(du -h pdfbox/fontbox/cache.aot | awk '{print $1}') |"
            echo "| pdfbox | \`pdfbox/pdfbox/cache.aot\` | $(du -h pdfbox/pdfbox/cache.aot | awk '{print $1}') |"
            echo "| tools | \`pdfbox/tools/cache.aot\` | $(du -h pdfbox/tools/cache.aot | awk '{print $1}') |"
            echo "| pdfbox-jbig2 | \`pdfbox-deps/pdfbox-jbig2/cache.aot\` | $(du -h pdfbox-deps/pdfbox-jbig2/cache.aot | awk '{print $1}') |"
            echo "| apache-commons-io | \`pdfbox-deps/apache-commons-io/cache.aot\` | $(du -h pdfbox-deps/apache-commons-io/cache.aot | awk '{print $1}') |"
            echo "| commons-logging-workload | \`pdfbox-deps/commons-logging-workload/cache.aot\` | $(du -h pdfbox-deps/commons-logging-workload/cache.aot | awk '{print $1}') |"
            for op in export-text export-images render fromtext split merge decode overlay; do
              echo "| single-${op} | \`single-${op}.aot\` | $(du -h "single-${op}.aot" | awk '{print $1}') |"
            done
            echo "| tree | \`tree.aot\` | $(du -h tree.aot | awk '{print $1}') |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PDFBox workload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfbox-tree-artifacts
          path: |
            pdfbox-experiment/workload-tmp/
            pdfbox-experiment/aotlink-tree-create.log
            pdfbox-experiment/single-*.aot
            pdfbox-experiment/tree.aot
            pdfbox-experiment/pdfbox/io/cache.aot
            pdfbox-experiment/pdfbox/fontbox/cache.aot
            pdfbox-experiment/pdfbox/pdfbox/cache.aot
            pdfbox-experiment/pdfbox/tools/cache.aot
            pdfbox-experiment/pdfbox-deps/pdfbox-jbig2/cache.aot
            pdfbox-experiment/pdfbox-deps/apache-commons-io/cache.aot
            pdfbox-experiment/pdfbox-deps/commons-logging-workload/cache.aot
          if-no-files-found: error
